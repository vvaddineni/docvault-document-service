name: Document Service CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/docvault-document-service
  JAVA_VERSION: '21'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - name: Run tests
        run: mvn test -q

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build JAR
        run: mvn package -DskipTests -q

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: docvault-document-service
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          containerAppEnvironment: docvault-env
          imageToDeploy: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          registryUrl: ${{ env.REGISTRY }}
          registryUsername: ${{ github.actor }}
          registryPassword: ${{ secrets.GHCR_TOKEN }}
          targetPort: 8080

      - name: Set env vars on Document Service Container App
        env:
          STORAGE_ACCOUNT: ${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }}
          STORAGE_KEY: ${{ secrets.AZURE_STORAGE_ACCOUNT_KEY }}
          COSMOS_ENDPOINT: ${{ secrets.AZURE_COSMOS_ENDPOINT }}
          COSMOS_KEY: ${{ secrets.AZURE_COSMOS_KEY }}
          SRCH_URL: ${{ secrets.SEARCH_SERVICE_URL }}
        run: |
          az containerapp update \
            --name docvault-document-service \
            --resource-group docvault-rg \
            --set-env-vars \
              AZURE_STORAGE_ACCOUNT_NAME="$STORAGE_ACCOUNT" \
              AZURE_STORAGE_ACCOUNT_KEY="$STORAGE_KEY" \
              AZURE_COSMOS_ENDPOINT="$COSMOS_ENDPOINT" \
              AZURE_COSMOS_KEY="$COSMOS_KEY" \
              SEARCH_SERVICE_URL="$SRCH_URL"
          echo "Env vars updated on Document Service Container App"

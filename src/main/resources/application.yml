spring:
  application:
    name: document-service
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 102MB

  # ── Spring Cloud Azure (Cosmos DB + credentials) ───────────────
  cloud:
    azure:
      cosmos:
        endpoint:  ${AZURE_COSMOS_ENDPOINT:https://docvaultdev.documents.azure.com:443/}
        key:       ${AZURE_COSMOS_KEY:}
        database:  ${AZURE_COSMOS_DATABASE:DocVaultDB}
        populate-query-metrics: false
      credential:
        client-id:     ${AZURE_CLIENT_ID:}
        tenant-id:     ${AZURE_TENANT_ID:}
        client-secret: ${AZURE_CLIENT_SECRET:}

server:
  port: 8080

# Search Service URL for async post-upload indexing
search:
  service:
    url: ${SEARCH_SERVICE_URL:}

# ── Azure Blob Storage (custom AzureStorageProperties) ────────
azure:
  storage:
    account-name:   ${AZURE_STORAGE_ACCOUNT_NAME:docvaultdev}
    account-key:    ${AZURE_STORAGE_ACCOUNT_KEY:}      # blank = Managed Identity
    endpoint:       ${AZURE_STORAGE_ENDPOINT:https://${azure.storage.account-name}.blob.core.windows.net}
    container:
      hot:  ${AZURE_STORAGE_CONTAINER_HOT:documents-hot}
      cold: ${AZURE_STORAGE_CONTAINER_COLD:documents-cold}
    sas:
      expiry-minutes: ${AZURE_STORAGE_SAS_EXPIRY_MINUTES:15}
    rehydration:
      default-priority: ${AZURE_STORAGE_REHYDRATION_PRIORITY:Standard}

  # Custom properties read by @Value in DocumentRepositoryCustomImpl
  cosmos:
    database:  ${AZURE_COSMOS_DATABASE:DocVaultDB}
    container: ${AZURE_COSMOS_CONTAINER:documents}

# ── Actuator ──────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: always

# ── OpenAPI ───────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# ── Logging ───────────────────────────────────────────────────
logging:
  level:
    com.docvault: DEBUG
    com.azure:    WARN

---
spring:
  config:
    activate:
      on-profile: prod
  cloud:
    azure:
      credential:
        managed-identity-enabled: true

logging:
  level:
    com.docvault: INFO
